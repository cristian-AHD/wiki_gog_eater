<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materiales - God Eater Wiki</title>
</head>
<body>

<nav>
    <a href="index.html">Inicio</a> |
    <a href="aragami.html">Aragami</a> |
    <a href="armas.html">Armas</a> |
    <a href="godeater.html">God Eaters</a> |
    <a href="areas.html">Áreas</a> |
    <a href="materiales.html">Materiales</a>
</nav>

<h1>Materiales</h1>

<input type="text" id="buscador" placeholder="Buscar material..." oninput="filtrar()">

<label>Filtrar por origen:
    <select onchange="filtrarOrigen(this.value)">
        <option value="">Todos</option>
        <option value="Aragami">Aragami</option>
        <option value="Objetivo Perdido">Objetivo Perdido</option>
    </select>
</label>

<label>Filtrar por dificultad:
    <select onchange="filtrarRango(this.value)">
        <option value="">Todas</option>
        <option value="1-3">Fácil (1-3)</option>
        <option value="4-6">Medio (4-6)</option>
        <option value="7-10">Difícil (7-10)</option>
    </select>
</label>

<div id="lista">Cargando...</div>

<div id="detalle" style="display:none;">
    <button onclick="cerrarDetalle()">← Volver</button>
    <div id="detalle-contenido"></div>
</div>

<script>
const API = "http://127.0.0.1:8000";
let todos = [];

async function cargar() {
    const res = await fetch(API + "/material");
    todos = await res.json();
    mostrar(todos);
}

function mostrar(lista) {
    if (lista.length === 0) {
        document.getElementById("lista").innerHTML = "<p>No se encontraron materiales.</p>";
        return;
    }
    let html = "<table border='1'><tr><th>ID</th><th>Nombre</th><th>Origen</th><th>Rango</th><th>Obtenido de</th><th>Ver</th></tr>";
    for (const m of lista) {
        html += `<tr>
            <td>${m.id}</td>
            <td>${m.nombre}</td>
            <td>${m.origen}</td>
            <td>${m.rango_mision}</td>
            <td>${m.obtenido_de}</td>
            <td><button onclick="verDetalle(${m.id})">Ver</button></td>
        </tr>`;
    }
    html += "</table>";
    document.getElementById("lista").innerHTML = html;
}

function filtrar() {
    const texto = document.getElementById("buscador").value.toLowerCase();
    const filtrados = todos.filter(m =>
        m.nombre.toLowerCase().includes(texto) ||
        m.obtenido_de.toLowerCase().includes(texto)
    );
    mostrar(filtrados);
}

function filtrarOrigen(origen) {
    const filtrados = origen ? todos.filter(m => m.origen === origen) : todos;
    mostrar(filtrados);
}

function filtrarRango(rango) {
    const filtrados = rango ? todos.filter(m => m.rango_mision === rango) : todos;
    mostrar(filtrados);
}

async function verDetalle(id) {
    const res = await fetch(API + "/material/" + id);
    const m = await res.json();

    let html = `<h2>${m.nombre}</h2>`;
    if (m.imagen) html += `<img src="${m.imagen}" alt="${m.nombre}" width="200"><br>`;
    html += `<p><strong>Origen:</strong> ${m.origen}</p>`;
    html += `<p><strong>Rango de misión:</strong> ${m.rango_mision}</p>`;
    html += `<p><strong>Obtenido de:</strong> ${m.obtenido_de}</p>`;
    if (m.descripcion) html += `<p><strong>Descripción:</strong> ${m.descripcion}</p>`;

    document.getElementById("lista").style.display = "none";
    document.getElementById("buscador").style.display = "none";
    document.getElementById("detalle-contenido").innerHTML = html;
    document.getElementById("detalle").style.display = "block";
}

function cerrarDetalle() {
    document.getElementById("lista").style.display = "block";
    document.getElementById("buscador").style.display = "block";
    document.getElementById("detalle").style.display = "none";
}

cargar();
</script>

</body>
</html>
