<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>God Eaters — God Eater Wiki</title>
    <link rel="stylesheet" href="style.css">
    <style>
      .ge-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:16px; margin-top:4px; }
      .ge-card {
        background:var(--panel);
        border:1px solid var(--border);
        border-radius:8px;
        padding:22px 18px;
        text-align:center;
        cursor:pointer;
        transition:all .3s;
        animation:cardIn .4s ease-out both;
        position:relative;
        overflow:hidden;
      }
      .ge-card::before {
        content:'';
        position:absolute;
        inset:0;
        background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(220,20,60,.12),transparent);
        opacity:0;
        transition:opacity .3s;
      }
      .ge-card:hover { transform:translateY(-6px); border-color:var(--crimson); box-shadow:0 8px 30px rgba(220,20,60,.25); }
      .ge-card:hover::before { opacity:1; }
      .ge-avatar { width:64px;height:64px;border-radius:50%;border:2px solid var(--crimson);margin:0 auto 12px;background:rgba(220,20,60,.15);display:flex;align-items:center;justify-content:center;font-size:2em;overflow:hidden; }
      .ge-avatar img { width:100%;height:100%;object-fit:cover; }
      .ge-name { font-family:'Cinzel Decorative',serif;font-size:.85em;color:var(--gold);margin-bottom:6px;line-height:1.3; }
      .ge-rank {
        font-family:'Orbitron',monospace;font-size:.65em;letter-spacing:.12em;text-transform:uppercase;
        color:var(--crimson);border:1px solid rgba(220,20,60,.3);border-radius:3px;padding:2px 10px;display:inline-block;
      }
      @keyframes cardIn { from{opacity:0;transform:scale(.95) translateY(8px);} to{opacity:1;transform:scale(1) translateY(0);} }
    </style>
</head>
<body>
<nav>
    <a href="index.html">Inicio</a>
    <a href="Aragami.html">Aragami</a>
    <a href="Armas.html">Armas</a>
    <a href="Godeater.html">God Eaters</a>
    <a href="Areas.html">Áreas</a>
    <a href="Materiales.html">Materiales</a>
</nav>

<div class="page-header" style="background:linear-gradient(180deg,rgba(0,60,100,.15) 0%,transparent 100%);border-bottom:1px solid var(--border);padding:40px 24px 28px;position:relative;z-index:1;">
    <h1>👤 God Eaters</h1>
    <p>Combatientes elegidos que empuñan el God Arc. La última esperanza de la humanidad.</p>
</div>

<main>
    <div style="max-width:480px;margin-bottom:20px;">
        <input type="text" id="buscador" placeholder="🔍  Buscar por nombre o rango..." oninput="filtrar()">
    </div>

    <div id="lista">Cargando...</div>

    <div id="detalle" style="display:none;">
        <button onclick="cerrarDetalle()">← Volver</button>
        <br><br>
        <div id="detalle-contenido"></div>
    </div>
</main>

<script>
const API="http://127.0.0.1:8000";
let todos=[];

async function cargar(){
  const res=await fetch(API+"/godeater");
  todos=await res.json();
  mostrar(todos);
}

function mostrar(lista){
  if(!lista.length){ document.getElementById('lista').innerHTML='<p>No se encontraron God Eaters.</p>'; return; }
  let html='<div class="ge-grid">';
  lista.forEach((g,i)=>{
    const avatar=g.imagen?`<img src="${g.imagen}" alt="${g.nombre}">`:'👤';
    html+=`<div class="ge-card" onclick="verDetalle(${g.id})" style="animation-delay:${i*.05}s">
      <div class="ge-avatar">${g.imagen?`<img src="${g.imagen}" alt="${g.nombre}">`:'👤'}</div>
      <div class="ge-name">${g.nombre}</div>
      <div class="ge-rank">${g.rango}</div>
    </div>`;
  });
  html+='</div>';
  document.getElementById('lista').innerHTML=html;
}

function filtrar(){
  const t=document.getElementById('buscador').value.toLowerCase();
  mostrar(todos.filter(g=>g.nombre.toLowerCase().includes(t)||g.rango.toLowerCase().includes(t)));
}

async function verDetalle(id){
  const res=await fetch(API+"/godeater/"+id);
  const g=await res.json();
  let html=`<h2>${g.nombre}</h2>`;
  if(g.imagen) html+=`<img src="${g.imagen}" alt="${g.nombre}" style="max-width:260px;border-radius:8px;"><br>`;
  html+=`<p><strong>Rango:</strong> <span style="color:var(--crimson)">${g.rango}</span></p>`;
  if(g.descripcion) html+=`<p><strong>Descripción:</strong> ${g.descripcion}</p>`;
  const armaItems=[];
  if(g.espada_id){ const e=await fetch(API+"/espada/"+g.espada_id).then(r=>r.json()); armaItems.push(`⚔ <strong>Espada:</strong> ${e.nombre} (${e.tipo})`); }
  if(g.escudo_id){ const e=await fetch(API+"/escudo/"+g.escudo_id).then(r=>r.json()); armaItems.push(`🛡 <strong>Escudo:</strong> ${e.nombre} (${e.tipo})`); }
  if(g.pistola_id){ const e=await fetch(API+"/pistola/"+g.pistola_id).then(r=>r.json()); armaItems.push(`🔫 <strong>Pistola:</strong> ${e.nombre} (${e.tipo})`); }
  if(g.unidad_id){ const e=await fetch(API+"/unidad/"+g.unidad_id).then(r=>r.json()); armaItems.push(`⚙ <strong>Unidad:</strong> ${e.nombre} (${e.tipo})`); }
  if(armaItems.length){
    html+=`<div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:16px;margin-top:14px;">
      <p style="color:var(--gold-dim);font-family:'Orbitron',monospace;font-size:.75em;letter-spacing:.1em;margin-bottom:10px;">GOD ARC</p>
      ${armaItems.map(a=>`<p>${a}</p>`).join('')}
    </div>`;
  }
  document.getElementById('lista').style.display='none';
  document.getElementById('buscador').parentElement.style.display='none';
  document.getElementById('detalle-contenido').innerHTML=html;
  document.getElementById('detalle').style.display='block';
}

function cerrarDetalle(){
  document.getElementById('lista').style.display='';
  document.getElementById('buscador').parentElement.style.display='';
  document.getElementById('detalle').style.display='none';
}

cargar();
</script>
</body>
</html>
