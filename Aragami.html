<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aragami - God Eater Wiki</title>
</head>
<body>

<nav>
    <a href="index.html">Inicio</a> |
    <a href="aragami.html">Aragami</a> |
    <a href="armas.html">Armas</a> |
    <a href="godeater.html">God Eaters</a> |
    <a href="areas.html">Áreas</a> |
    <a href="materiales.html">Materiales</a>
</nav>

<h1>Aragami</h1>

<input type="text" id="buscador" placeholder="Buscar aragami..." oninput="filtrar()">

<div id="lista">Cargando...</div>

<div id="detalle" style="display:none;">
    <button onclick="cerrarDetalle()">← Volver a la lista</button>
    <div id="detalle-contenido"></div>
</div>

<hr>

<!-- Botón para mostrar login -->
<div id="login-box">
    <button onclick="mostrarLogin()">+ Agregar Aragami (Admin)</button>
</div>

<!-- Login admin -->
<div id="login-form" style="display:none;padding:16px;border:1px solid #ccc;margin-top:12px;">
    <h3>Acceso Admin</h3>
    <label>Usuario: <input type="text" id="admin-user" placeholder="admin"></label><br><br>
    <label>Contraseña: <input type="password" id="admin-pass"></label><br><br>
    <button onclick="verificarLogin()">Entrar</button>
    <button onclick="cancelarLogin()">Cancelar</button>
    <p id="login-error" style="color:red;display:none">Usuario o contraseña incorrectos</p>
</div>

<!-- Formulario crear aragami -->
<div id="form-aragami" style="display:none;padding:16px;border:1px solid #ccc;margin-top:12px;">
    <h3>Crear Aragami</h3>
    <label>Nombre: <input type="text" id="ar-nombre" placeholder="Ej: Ogretail"></label><br><br>
    <label>Tipo: <input type="text" id="ar-tipo" placeholder="Ej: Depredador"></label><br><br>
    <label>Debilidades (separadas por coma): <input type="text" id="ar-debilidades" placeholder="Ej: Fuego, Rayo"></label><br><br>
    <label>Descripción: <textarea id="ar-descripcion" rows="3" placeholder="Descripción del aragami..."></textarea></label><br><br>
    <label>URL Imagen: <input type="text" id="ar-imagen" placeholder="https://..."></label><br><br>
    <button onclick="crearAragami()">Crear</button>
    <button onclick="cerrarFormulario()">Cancelar</button>
    <p id="ar-msg"></p>
</div>

<script>
const API = "http://127.0.0.1:8000";
const ADMIN_USER = "admin";
const ADMIN_PASS = "godeater2026";
let todos = [];

async function cargar() {
    const res = await fetch(API + "/aragami");
    todos = await res.json();
    mostrar(todos);
}

function mostrar(lista) {
    if (lista.length === 0) {
        document.getElementById("lista").innerHTML = "<p>No se encontraron aragami.</p>";
        return;
    }
    let html = "<table border='1'><tr><th>ID</th><th>Nombre</th><th>Tipo</th><th>Debilidades</th><th>Ver</th></tr>";
    for (const a of lista) {
        const debs = Array.isArray(a.debilidades) ? a.debilidades.join(", ") : a.debilidades;
        html += `<tr>
            <td>${a.id}</td>
            <td>${a.nombre}</td>
            <td>${a.tipo}</td>
            <td>${debs}</td>
            <td><button onclick="verDetalle(${a.id})">Ver</button></td>
        </tr>`;
    }
    html += "</table>";
    document.getElementById("lista").innerHTML = html;
}

function filtrar() {
    const texto = document.getElementById("buscador").value.toLowerCase();
    const filtrados = todos.filter(a => a.nombre.toLowerCase().includes(texto) || a.tipo.toLowerCase().includes(texto));
    mostrar(filtrados);
}

async function verDetalle(id) {
    const res = await fetch(API + "/aragami/" + id);
    const a = await res.json();
    const debs = Array.isArray(a.debilidades) ? a.debilidades.join(", ") : a.debilidades;

    let html = `<h2>${a.nombre}</h2>`;
    if (a.imagen) html += `<img src="${a.imagen}" alt="${a.nombre}" width="300"><br>`;
    html += `<p><strong>Tipo:</strong> ${a.tipo}</p>`;
    html += `<p><strong>Debilidades:</strong> ${debs}</p>`;
    if (a.descripcion) html += `<p><strong>Descripción:</strong> ${a.descripcion}</p>`;

    document.getElementById("lista").style.display = "none";
    document.getElementById("buscador").style.display = "none";
    document.getElementById("detalle-contenido").innerHTML = html;
    document.getElementById("detalle").style.display = "block";
}

function cerrarDetalle() {
    document.getElementById("lista").style.display = "block";
    document.getElementById("buscador").style.display = "block";
    document.getElementById("detalle").style.display = "none";
}

function mostrarLogin() {
    document.getElementById("login-box").style.display = "none";
    document.getElementById("login-form").style.display = "block";
}

function cancelarLogin() {
    document.getElementById("login-form").style.display = "none";
    document.getElementById("login-box").style.display = "block";
    document.getElementById("login-error").style.display = "none";
}

function verificarLogin() {
    const user = document.getElementById("admin-user").value;
    const pass = document.getElementById("admin-pass").value;
    if (user === ADMIN_USER && pass === ADMIN_PASS) {
        document.getElementById("login-form").style.display = "none";
        document.getElementById("form-aragami").style.display = "block";
    } else {
        document.getElementById("login-error").style.display = "block";
    }
}

function cerrarFormulario() {
    document.getElementById("form-aragami").style.display = "none";
    document.getElementById("login-box").style.display = "block";
}

async function crearAragami() {
    const nombre = document.getElementById("ar-nombre").value.trim();
    const tipo = document.getElementById("ar-tipo").value.trim();
    if (!nombre || !tipo) {
        document.getElementById("ar-msg").style.color = "red";
        document.getElementById("ar-msg").textContent = "Nombre y tipo son obligatorios";
        return;
    }
    const debilidades = document.getElementById("ar-debilidades").value
        .split(",").map(d => d.trim()).filter(d => d);

    const res = await fetch(API + "/aragami", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            nombre,
            tipo,
            debilidades,
            descripcion: document.getElementById("ar-descripcion").value || null,
        })
    });
    const data = await res.json();
    if (res.ok) {
        const imagen = document.getElementById("ar-imagen").value.trim();
        if (imagen) {
            await fetch(`${API}/imagen/aragami/${data.id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ url: imagen })
            });
        }
        document.getElementById("ar-msg").style.color = "green";
        document.getElementById("ar-msg").textContent = "Aragami creado correctamente";
        document.getElementById("ar-nombre").value = "";
        document.getElementById("ar-tipo").value = "";
        document.getElementById("ar-debilidades").value = "";
        document.getElementById("ar-descripcion").value = "";
        document.getElementById("ar-imagen").value = "";
        cargar();
    } else {
        document.getElementById("ar-msg").style.color = "red";
        document.getElementById("ar-msg").textContent = "Error al crear el aragami";
    }
}

cargar();
</script>

</body>
</html>
