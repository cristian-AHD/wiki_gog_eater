<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>Áreas</h1>

<input type="text" id="buscador" placeholder="Buscar área..." oninput="filtrar()">

<div id="lista">Cargando...</div>

<div id="detalle" style="display:none;">
    <button onclick="cerrarDetalle()">← Volver</button>
    <div id="detalle-contenido"></div>
</div>

<script>
const API = "http://127.0.0.1:8000";
let todos = [];

async function cargar() {
    const res = await fetch(API + "/area");
    todos = await res.json();
    mostrar(todos);
}

function mostrar(lista) {
    if (lista.length === 0) {
        document.getElementById("lista").innerHTML = "<p>No se encontraron áreas.</p>";
        return;
    }
    let html = "<table border='1'><tr><th>ID</th><th>Nombre</th><th>Ver</th></tr>";
    for (const a of lista) {
        html += `<tr>
            <td>${a.id}</td>
            <td>${a.nombre}</td>
            <td><button onclick="verDetalle(${a.id})">Ver</button></td>
        </tr>`;
    }
    html += "</table>";
    document.getElementById("lista").innerHTML = html;
}

function filtrar() {
    const texto = document.getElementById("buscador").value.toLowerCase();
    const filtrados = todos.filter(a => a.nombre.toLowerCase().includes(texto));
    mostrar(filtrados);
}

async function verDetalle(id) {
    const res = await fetch(API + "/area/" + id);
    const a = await res.json();

    let html = `<h2>${a.nombre}</h2>`;
    if (a.imagen) html += `<img src="${a.imagen}" alt="${a.nombre}" width="300"><br>`;
    if (a.descripcion) html += `<p><strong>Descripción:</strong> ${a.descripcion}</p>`;

    document.getElementById("lista").style.display = "none";
    document.getElementById("buscador").style.display = "none";
    document.getElementById("detalle-contenido").innerHTML = html;
    document.getElementById("detalle").style.display = "block";
}

function cerrarDetalle() {
    document.getElementById("lista").style.display = "block";
    document.getElementById("buscador").style.display = "block";
    document.getElementById("detalle").style.display = "none";
}

cargar();
</script>

</body>
</html>
