<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Armas - God Eater Wiki</title>
</head>
<body>

<nav>
    <a href="index.html">Inicio</a> |
    <a href="aragami.html">Aragami</a> |
    <a href="armas.html">Armas</a> |
    <a href="godeater.html">God Eaters</a> |
    <a href="areas.html">Áreas</a> |
    <a href="materiales.html">Materiales</a>
</nav>

<h1>Armas</h1>

<button onclick="mostrarSeccion('espada')">Espadas</button>
<button onclick="mostrarSeccion('escudo')">Escudos</button>
<button onclick="mostrarSeccion('pistola')">Pistolas</button>
<button onclick="mostrarSeccion('unidad')">Unidades de Control</button>

<input type="text" id="buscador" placeholder="Buscar arma..." oninput="filtrar()">

<h2 id="titulo-seccion">Espadas</h2>
<div id="lista">Cargando...</div>

<div id="detalle" style="display:none;">
    <button onclick="cerrarDetalle()">← Volver</button>
    <div id="detalle-contenido"></div>
</div>

<script>
const API = "http://127.0.0.1:8000";
let todos = [];
let seccionActual = "espada";

async function mostrarSeccion(seccion) {
    seccionActual = seccion;
    const titulos = { espada: "Espadas", escudo: "Escudos", pistola: "Pistolas", unidad: "Unidades de Control" };
    document.getElementById("titulo-seccion").textContent = titulos[seccion];
    document.getElementById("buscador").value = "";
    const res = await fetch(API + "/" + seccion);
    todos = await res.json();
    mostrar(todos);
}

function mostrar(lista) {
    if (lista.length === 0) {
        document.getElementById("lista").innerHTML = "<p>No hay registros.</p>";
        return;
    }
    let html = "<table border='1'><tr><th>ID</th><th>Nombre</th><th>Tipo</th><th>Elemento</th><th>Sunder</th><th>Crush</th><th>Pierce</th><th>Ver</th></tr>";
    for (const a of lista) {
        html += `<tr>
            <td>${a.id}</td>
            <td>${a.nombre}</td>
            <td>${a.tipo}</td>
            <td>${a.elemento || "-"}</td>
            <td>${a.sunder ?? "-"}</td>
            <td>${a.crush ?? "-"}</td>
            <td>${a.pierce ?? "-"}</td>
            <td><button onclick="verDetalle(${a.id})">Ver</button></td>
        </tr>`;
    }
    html += "</table>";
    document.getElementById("lista").innerHTML = html;
}

function filtrar() {
    const texto = document.getElementById("buscador").value.toLowerCase();
    const filtrados = todos.filter(a => a.nombre.toLowerCase().includes(texto));
    mostrar(filtrados);
}

async function verDetalle(id) {
    const res = await fetch(API + "/" + seccionActual + "/" + id);
    const a = await res.json();

    let html = `<h2>${a.nombre}</h2>`;
    if (a.imagen) html += `<img src="${a.imagen}" alt="${a.nombre}" width="300"><br>`;
    html += `<p><strong>Tipo:</strong> ${a.tipo}</p>`;
    if (a.elemento) html += `<p><strong>Elemento:</strong> ${a.elemento} (${a.valor_elemento} pts)</p>`;
    if (a.sunder !== undefined) {
        html += `<p><strong>Sunder:</strong> ${a.sunder} | <strong>Crush:</strong> ${a.crush} | <strong>Pierce:</strong> ${a.pierce}</p>`;
    }
    if (a.buffs) html += `<p><strong>Buffs:</strong> ${a.buffs}</p>`;
    if (a.materiales && a.materiales.length > 0) {
        html += `<p><strong>Materiales:</strong> ${a.materiales.join(", ")}</p>`;
    }

    document.getElementById("lista").style.display = "none";
    document.getElementById("buscador").style.display = "none";
    document.getElementById("detalle-contenido").innerHTML = html;
    document.getElementById("detalle").style.display = "block";
}

function cerrarDetalle() {
    document.getElementById("lista").style.display = "block";
    document.getElementById("buscador").style.display = "block";
    document.getElementById("detalle").style.display = "none";
}

mostrarSeccion("espada");
</script>

</body>
</html>
